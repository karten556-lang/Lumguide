<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Bulb shape -->
  <g transform="translate(256,240)">
    <!-- Bulb body -->
    <path d="M-40,-10 Q-50,-50 -35,-80 Q-20,-110 0,-115 Q20,-110 35,-80 Q50,-50 40,-10 Z"
          fill="url(#glow)" opacity="0.95"/>
    <ellipse cx="0" cy="-58" rx="22" ry="28" fill="#fff" opacity="0.2"/>
    <!-- Light rays -->
    <g stroke="url(#glow)" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-130" x2="0" y2="-150"/>
      <line x1="-45" y1="-105" x2="-60" y2="-120"/>
      <line x1="45" y1="-105" x2="60" y2="-120"/>
      <line x1="-68" y1="-55" x2="-88" y2="-55"/>
      <line x1="68" y1="-55" x2="88" y2="-55"/>
    </g>
    <!-- Base -->
    <rect x="-20" y="10" width="40" height="20" rx="3" fill="#334155"/>
    <rect x="-10" y="30" width="20" height="25" rx="2" fill="#334155"/>
  </g>
  <!-- Letter L -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="100" fill="url(#glow)" letter-spacing="15">LG</text>
</svg>
